version: v2
plugins:
  - local: ["go", "tool", "google.golang.org/protobuf/cmd/protoc-gen-go"]
    out: pb
    opt: paths=source_relative
  - local: ["go", "tool", "google.golang.org/grpc/cmd/protoc-gen-go-grpc"]
    out: pb
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false
inputs:
  - directory: pb